<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>eWriter Pro</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Courier+Prime&display=swap" rel="stylesheet">
    <!-- Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Lógica y Firebase (Compat para poder abrir en local) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    
    <script src="app.js" defer></script>
    <!-- Lógica del Editor de texto (Normal) -->
    <script src="editor.js" defer></script>
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-section" class="auth-wrapper">
        <div class="auth-panel glass-panel">
            <div class="logo">
                <i class="fa-solid fa-feather-pointed"></i>
                <h2>eWriter Pro</h2>
            </div>
            <p class="subtitle">Tu estudio de guiones en la nube</p>

            <form id="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" class="input-estilo" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" class="input-estilo" placeholder="Contraseña" required>
                </div>
                <div id="auth-error" class="error-message"></div>
                
                <button type="submit" class="btn btn-primary w-100">Iniciar Sesión / Registrarse</button>
            </form>
            <p class="text-sm text-muted" style="text-align: center; margin-top:15px;">Si la cuenta no existe, se creará automáticamente.</p>
        </div>
    </div>

    <!-- Pantalla Principal de la App -->
    <div id="app-section" class="hidden app-wrapper">
        
        <!-- Sidebar Izquierdo -->
        <aside id="sidebar" class="glass-panel">
            <div class="sidebar-header">
                <div class="logo-small"><i class="fa-solid fa-feather-pointed"></i> eWriter</div>
                <button id="btn-logout" class="btn-icon" title="Cerrar sesión"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
            </div>
            
            <div class="sidebar-section">
                <h3>Tus Guiones</h3>
                <button id="btn-new-script" class="btn btn-success w-100 mb-10"><i class="fa-solid fa-plus"></i> Nuevo Guion</button>
                <div id="script-list" class="script-list">
                    <!-- Cargado por JS -->
                </div>
            </div>

            <hr class="divider-side">

            <div class="sidebar-section">
                <h3>Formato (Tab)</h3>
                <button class="btn-style active" data-type="slugline" onclick="applyStyle('slugline')">Encabezado</button>
                <button class="btn-style" data-type="action" onclick="applyStyle('action')">Acción</button>
                <button class="btn-style" data-type="character" onclick="applyStyle('character')">Personaje</button>
                <button class="btn-style" data-type="parenthetical" onclick="applyStyle('parenthetical')">Paréntesis</button>
                <button class="btn-style" data-type="dialogue" onclick="applyStyle('dialogue')">Diálogo</button>
                <button class="btn-style" data-type="transition" onclick="applyStyle('transition')">Transición</button>
            </div>
            
            <div class="shortcuts-info mt-auto">
                <b>Atajos:</b><br>
                • <kbd>Enter</kbd> Salto lógico<br>
                • <kbd>Tab</kbd> Rotar estilos<br>
            </div>
        </aside>

        <!-- Área Central de Trabajo -->
        <main id="canvas-area">
            <header class="editor-header glass-panel">
                <input type="text" id="script-title" class="title-input" placeholder="Selecciona un guion para empezar..." disabled>
                <div class="editor-actions">
                    <span id="save-status" class="text-muted text-sm"><i class="fa-solid fa-cloud"></i> Autoguardado 10min</span>
                    <button id="btn-save" class="btn btn-primary btn-sm" disabled><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                </div>
            </header>
            
            <div class="editor-container">
                <div id="editor" contenteditable="false" spellcheck="false">
                    <div style="text-align: center; color: #999; margin-top: 50px; font-family: sans-serif;">⬅️ Selecciona o crea un guion en el menú lateral.</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Sistema de Notificaciones -->
    <div id="toast-container" class="toast-container"></div>

</body>
</html>
